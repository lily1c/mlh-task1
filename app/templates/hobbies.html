<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./static/styles/main.css">
<title>{{ title }}</title>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-logo"><a href="/"><img src="./static/img/logo.svg" /></a></div>
    <nav class="sidebar-menu">
        {% for page in pages %}
        <a href="{{ page.url }}" class="menu-button">{{ page.name }}</a>
        {% endfor %}
    </nav>
    <div class="sidebar-tag">CompE · AI/ML<br>MLH × Meta Fellow</div>
</aside>

<div class="content">
  <section class="hobbies" style="padding-top:48px;">
      <div class="section-head"><h2>{{ title }}</h2><span class="rule"></span></div>
      <div class="hobbies-grid">
          {% for hobby in hobbies %}
          <div class="hobby-card">
              <img src="{{ hobby.image }}" alt="{{ hobby.name }}" class="hobby-img">
              <div class="hobby-body">
                  <h3>{{ hobby.name }}</h3>
                  <p>{{ hobby.description }}</p>
              </div>
          </div>
          {% endfor %}
      </div>
  </section>
</div>
</body>
</html>
