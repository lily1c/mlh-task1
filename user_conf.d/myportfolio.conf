map $request_method $post_limit_key {
    POST    $binary_remote_addr;
    default "";
}

limit_req_zone $post_limit_key zone=timeline_post:10m rate=1r/m;

server {
    listen 80;
    server_name assolabasova.duckdns.org;

    if ($host = assolabasova.duckdns.org) {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name assolabasova.duckdns.org;

    location /api/timeline_post {
        limit_req zone=timeline_post;
        limit_req_status 429;
        proxy_pass http://myportfolio:5000;
    }

    location / {
        proxy_pass http://myportfolio:5000/;
    }

    ssl_certificate /etc/letsencrypt/live/assolabasova.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assolabasova.duckdns.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/assolabasova.duckdns.org/chain.pem;
}
